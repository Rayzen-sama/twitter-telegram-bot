name: Twitter Bot

on:
  workflow_dispatch:           # triggered by cron-job.org every 10 minutes

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install twikit==2.1.3 python-dotenv>=1.0

      - name: Run bot
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0:        ${{ secrets.TWITTER_CT0 }}
          TWITTER_ACCOUNTS:   ${{ secrets.TWITTER_ACCOUNTS }}
          GIST_TOKEN:         ${{ secrets.GIST_TOKEN }}
          GIST_ID:            ${{ secrets.GIST_ID }}
        run: python bot_once.py
